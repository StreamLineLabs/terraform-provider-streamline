name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: terraform-config
    attributes:
      label: Terraform Configuration
      description: Relevant Terraform configuration (remove sensitive values).
      render: hcl
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include terraform plan/apply output.
    validations:
      required: true
  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
      placeholder: "e.g., 1.5.0"
    validations:
      required: true
  - type: input
    id: provider-version
    attributes:
      label: Provider Version
      placeholder: "e.g., 0.2.0"
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
